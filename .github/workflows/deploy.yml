name: CI/CD Backend - Despachos

on:
  push:
    branches:
      - deploy

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout código
      uses: actions/checkout@v4

    - name: Configurar Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build con Maven
      # La bandera -DskipTests optimiza el tiempo de compilación ignorando los tests unitarios en esta fase
      run: mvn clean package -DskipTests -B

    - name: Login a Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build y Push imagen
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        # Aquí definimos explícitamente el nombre del repositorio que Docker Hub creará
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/back-despachos:latest

    - name: Deploy en EC2 Privada (Despachos)
      uses: appleboy/ssh-action@v1.0.3
      with:
        # Nota que usamos EC2_BACKEND_HOST, que apunta a tu servidor privado (10.0.2.44)
        host: ${{ secrets.EC2_BACKEND_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        # Configuración del Bastión (Jump Host) a través del Frontend
        proxy_host: ${{ secrets.EC2_FRONTEND_HOST }}
        proxy_username: ${{ secrets.EC2_USERNAME }}
        proxy_key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          cd ~/app/backend
          echo DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }} > .env
          echo DB_NAME=${{ secrets.DB_NAME }} >> .env
          echo DB_USERNAME=${{ secrets.DB_USERNAME }} >> .env
          echo DB_PASSWORD=${{ secrets.DB_PASSWORD }} >> .env
          echo MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }} >> .env
          docker-compose pull
          docker-compose up -d --force-recreate
          docker image prune -f